name: xiaomachi-linux-stack

services:
  llbot:
    image: linyuchen/llbot:8.0.14
    container_name: xiaomachi-llbot
    restart: "unless-stopped"
    network_mode: host
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - QQ=${BOT_QQ:-}
      - WEBUI_PORT=3080
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
      - NO_PROXY=${DOCKER_NO_PROXY:-localhost,127.0.0.1,llbot,xiaomachi,host.docker.internal}
    volumes:
      - llbot_data:/app/llbot/data
      - xiaomachi_data:/workspace/data:ro
  xiaomachi:
    image: xiaomachi-bot:local
    build:
      context: ../..
      dockerfile: infra/wsl/Dockerfile.xiaomachi
      network: host
      args:
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-10}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,llbot,xiaomachi,host.docker.internal}
    container_name: xiaomachi-bot
    restart: "no"
    network_mode: host
    working_dir: /workspace
    env_file:
      - ./.env
    environment:
      - NAPCAT_WS_URL=ws://127.0.0.1:${LLBOT_WS_PORT:-3002}
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Asia/Shanghai}
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
      - NO_PROXY=${DOCKER_NO_PROXY:-localhost,127.0.0.1,llbot,xiaomachi,host.docker.internal}
    volumes:
      - xiaomachi_data:/workspace/data
    depends_on:
      llbot:
        condition: service_started
    command: ["python", "-m", "app.group_main"]

volumes:
  llbot_data:
    external: true
    name: xiaomachi-llbot-data
  xiaomachi_data:
    external: true
    name: xiaomachi-bot-data
