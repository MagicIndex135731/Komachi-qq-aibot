services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: xiaomachi-napcat
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - ACCOUNT=${BOT_QQ:-}
      - NAPCAT_QUICK_PASSWORD=${NAPCAT_QUICK_PASSWORD:-}
      - NAPCAT_QUICK_PASSWORD_MD5=${NAPCAT_QUICK_PASSWORD_MD5:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${NAPCAT_HTTP_PORT:-6099}:6099"
      - "127.0.0.1:${NAPCAT_WS_PORT:-3001}:3001"
    volumes:
      - ./runtime/napcat/config:/app/napcat/config
      - ./runtime/napcat/logs:/app/napcat/logs
      - ./runtime/napcat/cache:/app/napcat/cache
      - ./runtime/napcat/ntqq:/app/.config/QQ
      - ../../data/generated_images:/workspace/data/generated_images:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6099/ >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s

  xiaomachi:
    image: python:3.12-slim
    container_name: xiaomachi-bot
    restart: unless-stopped
    network_mode: host
    working_dir: /workspace
    env_file:
      - ./.env
    environment:
      - NAPCAT_WS_URL=ws://127.0.0.1:3001
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Asia/Shanghai}
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
      - NO_PROXY=${DOCKER_NO_PROXY:-localhost,127.0.0.1,napcat,xiaomachi,host.docker.internal}
      - PIP_DEFAULT_TIMEOUT=${PIP_DEFAULT_TIMEOUT:-120}
      - PIP_RETRIES=${PIP_RETRIES:-10}
      - PIP_INDEX_URL=${PIP_INDEX_URL:-}
      - PIP_DISABLE_PIP_VERSION_CHECK=1
    volumes:
      - ../../:/workspace
      - ./runtime/logs:/workspace/data/logs
      - ./runtime/cache:/workspace/data/cache
      - ./runtime/pip-cache:/root/.cache/pip
    depends_on:
      napcat:
        condition: service_healthy
    command: >
      bash -lc "
      python -m pip install --timeout ${PIP_DEFAULT_TIMEOUT:-120} --retries ${PIP_RETRIES:-10} -U pip setuptools wheel &&
      python -m pip install --timeout ${PIP_DEFAULT_TIMEOUT:-120} --retries ${PIP_RETRIES:-10} --no-build-isolation -e . &&
      python -m app.group_main
      "
