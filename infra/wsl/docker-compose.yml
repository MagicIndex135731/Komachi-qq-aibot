name: xiaomachi-linux-napcat-stack

services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: xiaomachi-napcat
    restart: "no"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - ACCOUNT=${BOT_QQ:-}
      - NAPCAT_QUICK_PASSWORD=${NAPCAT_QUICK_PASSWORD:-}
      - NAPCAT_QUICK_PASSWORD_MD5=${NAPCAT_QUICK_PASSWORD_MD5:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${NAPCAT_HTTP_PORT:-6099}:6099"
      - "127.0.0.1:${NAPCAT_WS_PORT:-3001}:3001"
    volumes:
      - napcat_config:/app/napcat/config
      - napcat_logs:/app/napcat/logs
      - napcat_cache:/app/napcat/cache
      - napcat_ntqq:/app/.config/QQ
      - xiaomachi_data:/workspace/data:ro

  xiaomachi:
    image: xiaomachi-bot:local
    build:
      context: ../..
      dockerfile: infra/wsl/Dockerfile.xiaomachi
      network: host
      args:
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-10}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,napcat,xiaomachi,host.docker.internal}
    container_name: xiaomachi-bot
    restart: "no"
    network_mode: host
    working_dir: /workspace
    env_file:
      - ./.env
    environment:
      - NAPCAT_WS_URL=ws://127.0.0.1:3001
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Asia/Shanghai}
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
      - NO_PROXY=${DOCKER_NO_PROXY:-localhost,127.0.0.1,napcat,xiaomachi,host.docker.internal}
    volumes:
      - xiaomachi_data:/workspace/data
    devices:
      - "nvidia.com/gpu=all"
    depends_on:
      napcat:
        condition: service_started
    command: ["python", "-m", "app.group_main"]

volumes:
  napcat_config:
    name: xiaomachi-napcat-config
  napcat_logs:
    name: xiaomachi-napcat-logs
  napcat_cache:
    name: xiaomachi-napcat-cache
  napcat_ntqq:
    name: xiaomachi-napcat-ntqq
  xiaomachi_data:
    external: true
    name: xiaomachi-bot-data
